services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: naboo

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    env_file:
      - ./back-end/.env
    volumes:
      - ./back-end:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health-check"]
      interval: 15s
      timeout: 10s
      retries: 10
    depends_on:
      mongodb:
        condition: service_started

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    volumes:
      - ./front-end:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3001"
    env_file:
      - ./front-end/.env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data: